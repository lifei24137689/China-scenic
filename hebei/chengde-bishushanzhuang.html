﻿<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chengde Mountain Resort · 5A scenic Area Immersive Exploration</title>

  <style>
    /* ===== Reset & Base ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'PingFang SC','MicrosoftYaHei','Noto Serif SC',serif;
      background: #1a0a0a;
      color: #f5e6d3;
      overflow-x: hidden;
    }

    /* ===== T3 Imperial Style - Golden Tiles & Vermilion Walls ===== */
    :root {
      --primary: #c41e3a;
      --secondary: #d4a843;
      --bg: #1a0a0a;
      --surface: rgba(196,30,58,0.12);
      --text: #f5e6d3;
      --text-dim: rgba(245,230,211,0.55);
      --glow: rgba(212,168,67,0.25);
    }

    /* ===== Golden Glow Pulse Animation ===== */
    @keyframes goldenPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(212,168,67,0.2), 0 0 60px rgba(212,168,67,0.05); }
      50% { box-shadow: 0 0 40px rgba(212,168,67,0.35), 0 0 100px rgba(212,168,67,0.1); }
    }
    @keyframes dragonShimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    /* ===== Loading ===== */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(212,168,67,.1);
      border-top: 2px solid rgba(212,168,67,.5);
      border-radius: 50%; animation: spin 1.5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p {
      margin-top: 20px; font-size: 13px;
      color: rgba(245,230,211,.3);
      letter-spacing: 3px; font-family: 'Courier New',monospace;
    }

    /* ===== Dragon Pattern Decorative Line ===== */
    .dragon-line {
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--secondary), var(--primary), var(--secondary), transparent);
      background-size: 200% 100%;
      animation: dragonShimmer 4s ease-in-out infinite;
      position: relative;
    }
    .dragon-line::before {
      content: '┤"; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--secondary); font-size: 10px;
      text-shadow: 0 0 10px rgba(212,168,67,0.5);
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-bg {
      position: absolute; inset: -10px;
      background-size: cover;
      background-position: center;
      filter: brightness(0.65) saturate(1.15);
      transition: transform 0.1s ease-out;
      will-change: transform;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 25%, var(--bg) 80%);
    }
    .hero .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(212,168,67,.006) 2px,rgba(212,168,67,.006) 4px);
    }
    .hero .top-fade {
      position: absolute; top: 0; left: 0; right: 0; height: 30vh;
      background: linear-gradient(180deg,var(--bg) 0%,transparent 100%);
    }
    .hero .bottom-fade {
      position: absolute; bottom: 0; left: 0; right: 0; height: 40vh;
      background: linear-gradient(0deg,var(--bg) 0%,rgba(26,10,10,.9) 20%,transparent 100%);
    }
    .hero .golden-aura {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(212,168,67,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 50%, rgba(196,30,58,0.06) 0%, transparent 60%);
      pointer-events: none;
      animation: goldenPulse 4s ease-in-out infinite;
    }

    /* ===== HUD Overlay on Hero ===== */
    .hud {
      position: absolute; inset: 0; z-index: 10;
      padding: 28px 40px;
      display: flex; flex-direction: column;
    }
    .hud-top {
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 18px; border-radius: 20px;
      background: rgba(26,10,10,.5);
      border: 1px solid rgba(212,168,67,.15);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: rgba(245,230,211,.5); font-size: 13px; cursor: pointer;
      transition: all .3s; width: fit-content; text-decoration: none;
    }
    .back-btn:hover { border-color: rgba(212,168,67,.4); color: var(--secondary); }
    .back-btn .arrow { display: inline-block; transition: transform .3s; }
    .back-btn:hover .arrow { transform: translateX(-3px); }

    .title-group { margin-top: 20px; }
    .title-group h1 {
      font-size: 52px; font-weight: 700; letter-spacing: 3px;
      text-shadow: 0 0 60px rgba(0,0,0,.6);
      display: flex; align-items: baseline; gap: 14px;
    }
    .title-group h1 .badge {
      font-size: 12px; padding: 4px 16px; border-radius: 14px;
      background: rgba(212,168,67,.15);
      border: 1px solid rgba(212,168,67,.25);
      color: var(--secondary); letter-spacing: 1px;
      font-weight: 400; font-size: 11px;
    }
    .title-group h1 .stars {
      font-size: 16px; color: rgba(255,215,0,.4);
      letter-spacing: 2px; font-weight: 400;
    }
    .title-group .subtitle {
      font-size: 14px; color: var(--text-dim);
      letter-spacing: 6px; margin-top: 4px;
    }

    .data-panel { display: flex; gap: 8px; }
    .data-item {
      text-align: center; padding: 10px 18px; border-radius: 10px;
      background: rgba(26,10,10,.5);
      border: 1px solid rgba(212,168,67,.08);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      min-width: 72px;
    }
    .data-item .num { font-size: 20px; font-weight: 700; }
    .data-item .num.cyan { color: var(--secondary); }
    .data-item .num.green { color: var(--primary); }
    .data-item .num.pink { color: #fbc2eb; }
    .data-item .label { font-size: 9px; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }

    /* Info card on hero */
    .hero-info {
      position: absolute; left: 40px; bottom: 130px; z-index: 11;
      max-width: 440px;
    }
    .hero-info .card {
      background: rgba(26,10,10,.55);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-radius: 14px; border: 1px solid rgba(212,168,67,.1);
      padding: 22px 28px;
    }
    .hero-info .card p {
      font-size: 14px; line-height: 1.8; color: var(--text-dim);
    }
    .hero-info .tags { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
    .hero-info .tags span {
      padding: 4px 14px; border-radius: 14px; font-size: 11px;
      letter-spacing: 1px; border: 1px solid;
    }
    .tag-water { background: rgba(212,168,67,.08); border-color: rgba(212,168,67,.2); color: var(--secondary); }
    .tag-fall { background: rgba(196,30,58,.08); border-color: rgba(196,30,58,.2); color: var(--primary); }
    .tag-forest { background: rgba(212,168,67,.08); border-color: rgba(212,168,67,.2); color: var(--secondary); }

    .scroll-hint {
      position: absolute; bottom: 40px; left: 50%; z-index: 11;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: var(--text-dim);
      font-size: 10px; letter-spacing: 2px;
      font-family: 'Courier New',monospace;
    }
    .scroll-hint .line {
      width: 1px; height: 30px;
      background: linear-gradient(180deg,rgba(212,168,67,.4),transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%,100% { opacity: 0.3; transform: scaleY(0.5); }
      50% { opacity: 1; transform: scaleY(1); }
    }

    /* ===== Content Sections ===== */
    .section {
      position: relative;
      min-height: 80vh;
      display: flex;
      align-items: center;
      padding: 80px 40px;
    }
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }
    .section-inner.reverse {
      direction: rtl;
    }
    .section-inner.reverse > * {
      direction: ltr;
    }

    .section-image {
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.4), 0 0 30px var(--glow);
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(.16,1,.3,1);
    }
    .section-image.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .section-image img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }
    .section-image:hover img {
      transform: scale(1.03);
    }
    .section-image .img-gradient {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(0deg,rgba(26,10,10,0.6) 0%,transparent 100%);
      pointer-events: none;
    }
    .section-content {
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.8s cubic-bezier(.16,1,.3,1) 0.15s;
    }
    .section-content.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .section-content .numeral {
      font-family: 'Courier New',monospace;
      font-size: 13px; color: rgba(212,168,67,.4);
      letter-spacing: 3px; margin-bottom: 12px;
    }
    .section-content h2 {
      font-size: 32px; font-weight: 700; letter-spacing: 2px;
      margin-bottom: 20px; line-height: 1.3;
    }
    .section-content h2 .highlight {
      background: linear-gradient(135deg,var(--secondary),var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .section-content p {
      font-size: 15px; line-height: 1.9;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    .section-content .stat-row {
      display: flex; gap: 24px; margin-top: 24px;
    }
    .section-content .stat-item {
      text-align: center;
      padding: 16px 24px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid rgba(212,168,67,.08);
      min-width: 100px;
    }
    .section-content .stat-item .num {
      font-size: 28px; font-weight: 700; color: var(--secondary);
    }
    .section-content .stat-item .lbl {
      font-size: 10px; color: var(--text-dim);
      margin-top: 4px; letter-spacing: 1px;
    }
